apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongodb
  namespace: proshop

spec:
  serviceName: mongodb

  replicas: 3

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
      - name: mongodb
        image: mongo:4.4

        ports:
        - containerPort: 27017

        volumeMounts:
        - name: data
          mountPath: /data/db

  volumeClaimTemplates:
  - metadata:
      name: data

    spec:
      accessModes:
      - ReadWriteOnce

      storageClassName: mongodb-sc

      resources:
        requests:
          storage: 1Gi
